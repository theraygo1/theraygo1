<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>5K Savings Group</title>
  <style>
    :root {
      --primary-bg: linear-gradient(135deg, #0f301b 0%, #1a4a2b 50%, #276e3d 100%);
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent-green: #2ecc71;
      --accent-glow: #27ae60;
      --danger-red: #e74c3c;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--primary-bg);
      background-attachment: fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 650px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 5px;
      letter-spacing: 2px;
      text-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
      text-align: center;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #a5f3a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .counter-banner {
      color: #a5f3a5;
      margin-top: 5px;
      margin-bottom: 25px;
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
      background: rgba(46, 204, 113, 0.15);
      padding: 6px 20px;
      border-radius: 20px;
      border: 1px solid rgba(46, 204, 113, 0.3);
      backdrop-filter: blur(5px);
    }

    #namesInput {
      width: 100%;
      height: 120px;
      font-size: 1rem;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      padding: 15px;
      resize: none;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      background: var(--glass-bg);
      color: #e6ffe6;
      outline: none;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    #namesInput:focus {
      border-color: var(--accent-green);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
    }

    #pickBtn {
      margin-top: 20px;
      width: 100%;
      padding: 16px 30px;
      font-size: 1.25rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
      transition: all 0.3s transform, opacity, background-color ease;
      letter-spacing: 0.5px;
    }

    #pickBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(46, 204, 113, 0.6);
      filter: brightness(1.1);
    }
